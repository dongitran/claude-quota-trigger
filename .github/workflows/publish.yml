name: Publish to NPM

on:
  release:
    types: [published]

jobs:
  ci:
    name: Typecheck / Lint / Spell / Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Install dependencies
        run: npm ci

      - name: Run all checks
        run: npm run check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [ci]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [ci, build]
    permissions:
      contents: read
      id-token: write  # Required for npm trusted publisher (OIDC provenance)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24 (ships with npm 11.x — required for trusted publisher)
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public

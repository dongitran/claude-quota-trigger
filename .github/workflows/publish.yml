name: Publish to NPM

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # required for npm trusted publishing (OIDC)

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Trusted publisher uses OIDC — no registry-url needed here
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run all checks
        run: npm run check

      - name: Build
        run: npm run build

      - name: Show npm version (must be ≥ 11.5.1 for trusted publishing)
        run: npm --version

      - name: Publish with provenance (trusted publisher — no token needed)
        run: npm publish --provenance --access public

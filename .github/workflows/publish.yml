name: Publish to NPM

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # Required for npm trusted publisher (OIDC provenance)

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24 (ships with npm 11.x — required for trusted publisher)
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Install dependencies
        run: npm install

      - name: Run all checks
        run: npm run check

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public

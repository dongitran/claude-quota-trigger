name: Publish to NPM

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # required for npm trusted publishing (OIDC)

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Upgrade npm to 11.x (trusted publisher requires npm ≥ 11.5.1)
        run: |
          corepack enable
          corepack prepare npm@11.5.1 --activate
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Run all checks
        run: npm run check

      - name: Build
        run: npm run build

      - name: Publish with provenance (trusted publisher — no token needed)
        # Trusted publishing: npm uses OIDC token (id-token: write) instead of NPM_TOKEN
        # Configured at: https://www.npmjs.com/package/claude-quota-trigger/access
        run: npm publish --provenance --access public
